name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "static/**"
      - "scripts/build_pages.sh"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Queue deploys instead of cancelling in-flight runs — concurrent Pages
# deployments cause "Deployment failed, try again later."
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: |
          chmod +x scripts/build_pages.sh
          ./scripts/build_pages.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      - name: Wait for any in-flight Pages deployment
        run: sleep 45

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Back off before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 60

      - name: Retry deploy to GitHub Pages
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Fail if all deploy attempts failed
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: |
          echo "::error::GitHub Pages deploy failed after 2 attempts."
          echo "Ensure Settings → Pages → Source is 'GitHub Actions' (not a branch)."
          exit 1
